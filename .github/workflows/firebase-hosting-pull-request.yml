name: Deploy to Firebase Hosting and Functions on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Set up Node.js for Functions
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 2. Build Hosting assets (if necessary)
      - run: npm ci && npm run build

      # 3. Deploy to Firebase (Hosting + Functions + Cleanup Policy)
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TINKHERHACK_A8B8A }}
          projectId: tinkherhack-a8b8a
          # 💡 CORRECT METHOD: Use 'force: true' instead of 'args'
          force: true